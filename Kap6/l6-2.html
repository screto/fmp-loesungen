<body>
    <div class="header-nav">

        <a href="l6-3.html">Aufgabe 6.3 &raquo;</a>
    </div>

    <div class="aufgabe">
        <strong>Berechnen Sie den Winkel $\alpha$:</strong>

        <div class="task-row">
            <div class="task-left"><strong>a)</strong> $\sin(\alpha) = 0.2896$</div>
            <div class="task-right">
                <button class="toggle" onclick="toggleSolution('sol-a')">Lösung anzeigen</button>
                <div id="sol-a" class="solution is-hidden">$\alpha = \arcsin(0.2896) \approx 16.84^\circ$</div>
            </div>
        </div>

        <div class="task-row">
            <div class="task-left"><strong>b)</strong> $\cos(\alpha) = 0.7916$</div>
            <div class="task-right">
                <button class="toggle" onclick="toggleSolution('sol-b')">Lösung anzeigen</button>
                <div id="sol-b" class="solution is-hidden">$\alpha = \arccos(0.7916) \approx 37.66^\circ$</div>
            </div>
        </div>

        <div class="task-row">
            <div class="task-left"><strong>c)</strong> $\tan(\alpha) = 0.2247$</div>
            <div class="task-right">
                <button class="toggle" onclick="toggleSolution('sol-c')">Lösung anzeigen</button>
                <div id="sol-c" class="solution is-hidden">$\alpha = \arctan(0.2247) \approx 12.66^\circ$</div>
            </div>
        </div>
    </div>
</body>
